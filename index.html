<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Welcome to Tic-Tac-Toe</h1>
        <div class="grid">
            <div class="block"><p class="hide">0</p><p class="content"></p></div>
            <div class="block"><p class="hide">1</p><p class="content"></p></div>
            <div class="block"><p class="hide">2</p><p class="content"></p></div>
            <div class="block"><p class="hide">3</p><p class="content"></p></div>
            <div class="block"><p class="hide">4</p><p class="content"></p></div>
            <div class="block"><p class="hide">5</p><p class="content"></p></div>
            <div class="block"><p class="hide">6</p><p class="content"></p></div>
            <div class="block"><p class="hide">7</p><p class="content"></p></div>
            <div class="block"><p class="hide">8</p><p class="content"></p></div>
        </div>
        <h2>Player O turn</h2>
    </main>
    <script src="script.js"></script>
</body>
</html>
